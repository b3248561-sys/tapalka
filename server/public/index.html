<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tapalka</title>
    <link rel="stylesheet" href="style.css?v=20260325" />
  </head>
  <body>
    <div class="bg">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
    </div>
    <div class="app">
      <header class="top">
        <div class="brand">
          <div class="title" id="title">Tapalka</div>
          <div class="subtitle" id="subtitle">Tap to earn points</div>
        </div>
        <div class="lang-menu" id="langMenu">
          <button class="lang" id="langToggle" type="button" aria-expanded="false">EN</button>
          <div class="lang-dropdown" id="langDropdown"></div>
        </div>
      </header>

      <div class="screens">
        <section class="screen active" id="screenTap">
          <main class="panel">
            <div class="balance-wrap">
            <div class="balance-label" id="balanceLabel">Balance</div>
            <div class="balance" id="balance">0</div>
            <div class="player-id" id="playerId">ID: -</div>
            <div class="rank" id="rank">Rank</div>
            <div class="rank-bar"><span id="rankBar"></span></div>
            <div class="energy">
              <div class="energy-head">
                <span id="energyLabel">Energy</span>
                <span id="energyText">0/0</span>
              </div>
              <div class="energy-bar"><span id="energyBar"></span></div>
            </div>
          </div>
            <button class="tap" id="tap">Tap</button>
            <div class="meta" id="meta">Loading...</div>
          </main>
        </section>
        <section class="screen" id="screenShop">
          <div class="daily-card">
            <div>
              <div class="daily-title" id="dailyTitle">Daily Bonus</div>
              <div class="daily-subtitle" id="dailySubtitle">Come back every day</div>
            </div>
            <button class="daily-btn" id="dailyBtn">Claim</button>
            <div class="daily-status" id="dailyStatus">Ready</div>
          </div>
          <section class="shop">
            <div class="shop-head">
              <div>
                <div class="shop-title" id="shopTitle">Shop</div>
                <div class="shop-subtitle" id="shopSubtitle">Spend taps to upgrade</div>
                <div class="shop-balance" id="shopBalance">0</div>
              </div>
              <div class="shop-stats">
                <div class="tap-value" id="tapValue">+1 / tap</div>
              </div>
            </div>
            <div class="shop-list" id="shopList"></div>
          </section>
          <section class="quests">
            <div class="quests-head">
              <div>
                <div class="quests-title" id="questsTitle">Daily Quests</div>
                <div class="quests-subtitle" id="questsSubtitle">Complete and claim rewards</div>
              </div>
            </div>
            <div class="quests-list" id="questsList"></div>
          </section>
        </section>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="tap" id="tabTap">Tap</button>
        <button class="tab" data-tab="shop" id="tabShop">Shop</button>
      </nav>
      <footer class="footer">@Nleo2bot</footer>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function () {
        const script = document.createElement("script");
        script.src = "app.js?v=20260325";
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
