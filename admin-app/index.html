<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tapalka Admin Logs</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="top">
      <div>
        <h1>Tapalka Admin Logs <span class="badge">v2</span></h1>
        <p class="muted">Локальное приложение для просмотра логов (доступ только с этого ПК).</p>
      </div>
      <div class="top-actions">
        <button id="openAdmin" class="ghost">Админ</button>
        <button id="clearLocal" class="ghost">Стереть ключи</button>
      </div>
    </header>

    <nav class="tabs">
      <button id="tabLogs" class="tab is-active" data-view="logs">Логи</button>
      <button id="tabAdmin" class="tab" data-view="admin">Админ</button>
    </nav>

    <section class="card">
      <h2>Подключение устройства</h2>
      <div class="grid">
        <label>
          Сервер (Pages URL)
          <input id="serverUrl" type="text" placeholder="https://tapalka-bot.pages.dev" />
        </label>
        <label>
          Имя устройства
          <input id="deviceName" type="text" placeholder="My Laptop" />
        </label>
        <label>
          Токен регистрации
          <input id="enrollToken" type="password" placeholder="ADMIN_ENROLL_TOKEN" />
        </label>
      </div>
      <div class="row">
        <button id="enrollBtn">Зарегистрировать устройство</button>
        <span id="enrollStatus" class="muted"></span>
      </div>
      <div class="device-info" id="deviceInfo"></div>
    </section>

    <section class="card view" data-view="logs">
      <h2>Логи</h2>
      <div class="row">
        <input id="filterInput" type="text" placeholder="Фильтр: userId, ник, ip, action" />
        <button id="loadLogs">Загрузить</button>
      </div>
      <div id="logsStatus" class="muted"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ник</th>
              <th>Время</th>
              <th>User</th>
              <th>Действие</th>
              <th>IP (сырой)</th>
              <th>IP hash</th>
              <th>Страна</th>
              <th>Путь</th>
            </tr>
          </thead>
          <tbody id="logsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card view" data-view="admin" style="display:none">
      <h2>Админ</h2>
      <div class="grid">
        <label>
          User ID
          <input id="adminUserId" type="text" placeholder="123456789" />
        </label>
        <label>
          Баланс (±)
          <input id="adminDeltaBalance" type="number" step="1" placeholder="Напр. -50 или 200" />
        </label>
        <label>
          Установить баланс
          <input id="adminSetBalance" type="number" step="1" placeholder="Напр. 5000" />
        </label>
        <label>
          Установить силу тапа
          <input id="adminSetTapValue" type="number" step="1" placeholder="Напр. 3" />
        </label>
        <label>
          Бан на минут
          <input id="adminBanMinutes" type="number" step="1" placeholder="Напр. 60" />
        </label>
      </div>
      <div class="row">
        <button id="adminLoadUser">Загрузить пользователя</button>
        <button id="adminApply">Применить изменения</button>
        <button id="adminUnban" class="ghost">Снять бан</button>
        <button id="adminResetDaily" class="ghost">Сбросить день</button>
        <button id="adminClearBoost" class="ghost">Сбросить буст</button>
      </div>
      <div id="adminStatus" class="muted"></div>
      <div id="adminUserCard" class="admin-card muted">Пользователь не загружен.</div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
